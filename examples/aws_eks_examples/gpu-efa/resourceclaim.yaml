apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  annotations:
    resource.kubernetes.io/pod-claim-name: gpu-efa
  generateName: nccl-test-dra-worker-0-gpu-efa-
  name: nccl-test-dra-worker-0-gpu-efa-example
  namespace: default
  ownerReferences:
  - apiVersion: v1
    blockOwnerDeletion: true
    controller: true
    kind: Pod
    name: nccl-test-dra-worker-0
spec:
  devices:
    requests:
    - exactly:
        allocationMode: ExactCount
        count: 1
        deviceClassName: gpu.nvidia.com
      name: gpu
    - exactly:
        allocationMode: ExactCount
        count: 1
        deviceClassName: efa-rdma
      name: efa
status:
  allocation:
    devices:
      results:
      - device: gpu-6
        driver: gpu.nvidia.com
        pool: ip-192-168-153-160.ec2.internal
        request: gpu
      - device: pci-0000-a0-1b-0
        driver: dra.net
        pool: ip-192-168-153-160.ec2.internal
        request: efa
    nodeSelector:
      nodeSelectorTerms:
      - matchFields:
        - key: metadata.name
          operator: In
          values:
          - ip-192-168-153-160.ec2.internal
  devices:
  - conditions:
    - message: ""
      reason: RDMAOnlyDeviceReady
      status: "True"
      type: Ready
    device: pci-0000-a0-1b-0
    driver: dra.net
    pool: ip-192-168-153-160.ec2.internal
  reservedFor:
  - name: nccl-test-dra-worker-0
    resource: pods
