nameOverride: ""
fullnameOverride: ""

image:
  repository: registry.k8s.io/networking/dranet
  # tag defaults to .Chart.AppVersion when empty, which is set to the release tag at package time
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

rbac:
  create: true

podAnnotations: {}
podLabels: {}

logVerbosity: 4
metricsPort: ~
metricsPath: /healthz

# dranet daemon arguments — omit any field to use the binary's built-in default
args: {}
#  filter: '!("dra.net/type" in attributes) || attributes["dra.net/type"].StringValue  != "veth"'
#  inventoryMinPollInterval: "2s"
#  inventoryMaxPollInterval: "1m"
#  inventoryPollBurst: 5
#  moveIBInterfaces: true
#  cloudProviderHint: ""

nodeSelector: {}

affinity: {}

tolerations:
  - operator: Exists
    effect: NoSchedule

resources:
  requests:
    cpu: 100m
    memory: 50Mi
  limits: {}

serviceAccount:
  annotations: {}
