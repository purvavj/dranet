version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      k8s-deps:
        patterns:
          - "*k8s.io*"
      non-k8s-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "*k8s.io*"
    labels:
      - "area/dependency"
      - "ok-to-test"
      - "release-note-none"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "area/dependency"
      - "ok-to-test"
      - "release-note-none"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "area/dependency"
      - "ok-to-test"
      - "release-note-none"
